{{- if .Values.signoz.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ .Release.Namespace }}
data:
  config.yaml: |
    receivers:
      k8s_events:
        auth_type: serviceAccount
        namespaces: [ingress-nginx]    # adjust to your ingress namespace

      filelog/ingress:
        include:
          - /var/log/pods/ingress-nginx_*/*/*.log    # k3s pod log path on host
        start_at: beginning
        include_file_path: true
        operators:
          - type: regex_parser
            id: cri_parser
            regex: '^(?P<cri_time>\S+) (?P<stream>stdout|stderr) (?P<flags>\S+) (?P<log>.*)$'
            timestamp:
              parse_from: attributes.cri_time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'

          - type: move
            from: attributes.log
            to: body

          - type: json_parser
            timestamp:
              parse_from: body
              on_error: send

          - type: add
            field: attributes.source
            value: nginx-ingress-controller

      hostmetrics:
        collection_interval: 30s
        root_path: /hostfs
        scrapers:
          cpu:
          memory:
          disk:
          network:
          load:

      nginx:
        endpoint: http://127.0.0.1:30396/nginx_status  # use the k8s service name
        collection_interval: 10s

    processors:
      batch:
        timeout: 5s
      resource/tag:
        attributes:
          - key: service.name
            value: {{ .Values.signoz.serviceName }}
            action: upsert
          - key: deployment.environment
            value: {{ .Values.signoz.environment }}
            action: upsert

    exporters:
      otlp:
        endpoint: {{ .Values.signoz.endpoint }}
        tls:
          insecure: true

    service:
      pipelines:
        logs:
          receivers: [filelog/ingress]
          processors: [batch, resource/tag]
          exporters: [otlp]
        metrics:
          receivers: [hostmetrics, nginx]
          processors: [batch, resource/tag]
          exporters: [otlp]
{{- end }}
