apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ .Release.Namespace }}
data:
  config.yaml: |
    receivers:
      filelog/ingress:
        include:
          - /var/log/pods/ingress-nginx_ingress-nginx-controller-*/*/*.log
        start_at: beginning
        include_file_path: true

      hostmetrics:
        collection_interval: 30s
        root_path: /hostfs
        scrapers:
          cpu:
          memory:
          disk:
          network:
          load:
          filesystem:

      prometheus:
        config:
          scrape_configs:
            - job_name: nginx-ingress
              scrape_interval: 10s
              static_configs:
                - targets: ['10.43.194.82:10254']

    processors:
      batch:
        timeout: 5s
      resource/tag:
        attributes:
          - key: service.name
            value: {{ .Values.signoz.serviceName }}
            action: upsert
          - key: deployment.environment
            value: {{ .Values.signoz.environment }}
            action: upsert

    exporters:
      otlp:
        endpoint: {{ .Values.signoz.endpoint }}
        tls:
          insecure: true

    service:
      pipelines:
        logs:
          receivers: [filelog/ingress]
          processors: [batch, resource/tag]
          exporters: [otlp]
        metrics:
          receivers: [hostmetrics, prometheus]
          processors: [batch, resource/tag]
          exporters: [otlp]
