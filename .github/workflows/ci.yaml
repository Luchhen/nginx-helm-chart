name: Build and Push to Harbor

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'

jobs:
  build-and-push:
    runs-on: self-hosted  # uses your VM runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Harbor
        run: |
          docker login http://${{ secrets.HARBOR_URL }} \
            -u ${{ secrets.HARBOR_USERNAME }} \
            -p ${{ secrets.HARBOR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.HARBOR_URL }}/library/nginx-app:${{ github.sha }} \
            -t ${{ secrets.HARBOR_URL }}/library/nginx-app:latest \
            ./app

      - name: Push to Harbor
        run: |
          docker push ${{ secrets.HARBOR_URL }}/library/nginx-app:${{ github.sha }}
          docker push ${{ secrets.HARBOR_URL }}/library/nginx-app:latest

      - name: Update Helm values with new image tag
        run: |
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|g" helm/nginx-app/values.yaml

      - name: Commit and push updated values.yaml
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add helm/nginx-app/values.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}"
          git push
